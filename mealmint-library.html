<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="MealMint Health Labs responsive meal planning application demo.">
  <title>Library | MealMint Health Labs</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="library">
  <div class="app-shell">
    <header class="topbar">
      <div class="nav-wrap">
        <a class="brand-link" href="mealmint-index.html" aria-label="MealMint Health Labs home">
          <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
            <polygon points="32 4 56 18 32 60 8 18" fill="#2ECC8F"></polygon>
            <polygon points="32 4 56 18 34 60 34 10" fill="#1A8C5F" opacity="0.42"></polygon>
          </svg>
          <span>
            <span class="brand-name">MealMint Health Labs</span>
            <span class="brand-subtitle"> </span>
          </span>
        </a>
        <nav class="nav-menu" aria-label="Primary navigation">
          <a class="nav-link" data-nav="index" href="mealmint-index.html">Home</a>
          <a class="nav-link" data-nav="goals" href="mealmint-goals.html">Goals</a>
          <a class="nav-link" data-nav="library" href="mealmint-library.html">Library</a>
          <a class="nav-link" data-nav="planner" href="mealmint-planner.html">Planner</a>
          <a class="nav-link" data-nav="dashboard" href="mealmint-dashboard.html">Dashboard</a>
          <a class="nav-link" data-nav="grocery" href="mealmint-grocery.html">Grocery</a>
        </nav>
        <div class="nav-actions" aria-label="MealMint status">
          <span class="nav-pill" data-goal-chip>Goal: --</span>
          <span class="nav-pill" data-kcal-chip>0 kcal</span>
          <span class="nav-avatar" aria-hidden="true"></span>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="container">
        <div class="page-actions">
          <div class="page-heading compact" style="margin-bottom:0">
            <p class="eyebrow">Integrated Recipe Library</p>
            <h1>Recipe Library</h1>
            <p>Explore structured meal records, filter by type or cuisine, and add meals to your weekly planner.</p>
          </div>
          <a class="btn btn-secondary no-print" href="mealmint-planner.html">Go to Planner</a>
        </div>
        <div class="status-strip" data-profile-line></div>
        <div class="toolbar no-print">
          <input class="field" data-meal-search placeholder="Search meal name, cuisine, type, or dietary tag">
          <select class="field" data-type-filter>
            <option value="All">All Types</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Snack">Snack</option>
          </select>
          <select class="field" data-cuisine-filter>
            <option value="All">All Cuisines</option>
          </select>
          <button class="btn btn-secondary" data-reset-filters>Reset</button>
        </div>
        <div class="section-title">
          <h2>Available Meals</h2>
          <span class="helper-text" data-result-count></span>
        </div>
        <div class="recipe-grid" data-recipe-grid></div>
      </section>
    </main>
    <footer class="footer">
      <div class="container">
        <span>MealMint Health Labs</span>
        <span> </span>
      </div>
    </footer>
  </div>
  <script src="assets/js/app.js" defer></script>
</body>

</html>
